<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Ice and Instinct?", "acceptedAnswer": {"@type": "Answer", "text": "A private mixology studio for the home and the event. Led by one alchemist and carried by a team of trusted New York bartenders, it brings the craft, theatre, and discipline of a world-class bar into your own room."}}, {"@type": "Question", "name": "What actually happens at an event?", "acceptedAnswer": {"@type": "Answer", "text": "We arrive, build the bar, and run the evening end to end. Each cocktail is made in real time, with intention. You set the rhythm through one of four tiers, from impeccable classics to off-menu omakase improvisation."}}, {"@type": "Question", "name": "Is alcohol included in the price?", "acceptedAnswer": {"@type": "Answer", "text": "No. The tier price covers the craft, service, and expertise. You may provide the spirits and wine yourself, or we handle the entire purchase on your behalf at supplier cost."}}, {"@type": "Question", "name": "Do you bring everything - bar, tools, ice, glassware?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The bar setup, tools, and service are fully handled. Specialty ice from Michelin-level suppliers, curated glassware, and rentals are arranged through the Concierge and billed at supplier cost."}}, {"@type": "Question", "name": "Where do you serve?", "acceptedAnswer": {"@type": "Answer", "text": "The New York metropolitan area and New Jersey. Events further out are welcome, and any travel is included in your private quote."}}, {"@type": "Question", "name": "Can you handle a large event or wedding?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. One alchemist leads, and a team of trusted New York bartenders scales the service from an intimate solo performance to a full bar team for weddings, galas, and corporate events."}}, {"@type": "Question", "name": "Which tier should I choose?", "acceptedAnswer": {"@type": "Answer", "text": "Foundation is for intimate gatherings, Simplicity for a refined solo performance, Bespoke for signature cocktails built around your theme, and Omakase for a no-menu, improvised experience. Tell us the date, guest count, and mood, and we will guide you."}}, {"@type": "Question", "name": "Can the cocktails be tailored, and do you offer non-alcoholic options?", "acceptedAnswer": {"@type": "Answer", "text": "Yes to both. Every menu is built around your taste, theme, and any dietary needs, and a full zero-proof program is available so each guest is served with the same care."}}, {"@type": "Question", "name": "How far ahead should I book?", "acceptedAnswer": {"@type": "Answer", "text": "Two or more weeks is ideal, and shorter timelines are often possible. Ask, and we will tell you honestly what we can do."}}, {"@type": "Question", "name": "How does the deposit work?", "acceptedAnswer": {"@type": "Answer", "text": "A flat $500 deposit reserves your date. The balance is due before the event."}}, {"@type": "Question", "name": "What is your cancellation policy?", "acceptedAnswer": {"@type": "Answer", "text": "More than 14 days before the event, your $500 deposit is refunded. Within 14 days, the deposit is non-refundable but transferable to a future date within 12 months, subject to availability. Within 48 hours of the event, the full booking value is due."}}, {"@type": "Question", "name": "How do I book?", "acceptedAnswer": {"@type": "Answer", "text": "Send the date, the room, and the guest count through the inquiry form. You will have a private quote within one business day."}}]}</script>
