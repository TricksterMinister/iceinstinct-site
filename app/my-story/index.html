<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How far in advance should I reserve?", "acceptedAnswer": {"@type": "Answer", "text": "Most clients reserve 2-4 weeks ahead. Every evening is built as a one-of-one ritual, and preparation begins the moment we speak."}}, {"@type": "Question", "name": "Do you bring all ingredients and tools?", "acceptedAnswer": {"@type": "Answer", "text": "I arrive with the full bar kit and precision tools. I do not pour over hotel ice: proper clear ice is arranged through the Concierge before the evening, billed at supplier cost. Spirits and wine are provided by the host or sourced on your behalf at supplier cost; curated glassware and rentals are arranged through the Concierge."}}, {"@type": "Question", "name": "Can we choose specific cocktails?", "acceptedAnswer": {"@type": "Answer", "text": "For Simplicity and Bespoke, yes - we collaborate to refine a curated menu together. For Omakase, there is no menu - each creation emerges spontaneously in the moment, tailored to individual guests and the evening's flow."}}, {"@type": "Question", "name": "Do you provide a bar setup?", "acceptedAnswer": {"@type": "Answer", "text": "By default, I use your existing space. A full portable bar setup or premium glassware rental can be arranged upon request as an enhancement through The Curator add-on."}}, {"@type": "Question", "name": "Do you travel outside NYC and New Jersey?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, upon request. Travel fees and accommodations are arranged according to distance and event scale - subject to availability."}}, {"@type": "Question", "name": "What about postponements?", "acceptedAnswer": {"@type": "Answer", "text": "Your deposit can transfer to a new date within 12 months, subject to availability. One reschedule is included; further changes or peak dates may incur a fee."}}, {"@type": "Question", "name": "How many guests can you accommodate?", "acceptedAnswer": {"@type": "Answer", "text": "Foundation hosts up to 15 guests, Simplicity up to 12, Bespoke up to 30, and Omakase up to 25. Any tier scales further with a full bar team for weddings, galas, and corporate events - quoted on request."}}, {"@type": "Question", "name": "Can you create non-alcoholic drinks?", "acceptedAnswer": {"@type": "Answer", "text": "Absolutely. The ritual is about balance and craft, not alcohol. Every composition can be crafted spirit-free with the same precision, complexity, and emotion."}}, {"@type": "Question", "name": "Payment and deposit process", "acceptedAnswer": {"@type": "Answer", "text": "A flat $500 deposit reserves your date and is applied toward your final balance. More than 14 days before the event it is fully refundable; within 14 days it is transferable to a future date within 12 months, subject to availability."}}, {"@type": "Question", "name": "NDA and insurance", "acceptedAnswer": {"@type": "Answer", "text": "Confidentiality is part of the ethos. NDAs are available upon request. Certificates of insurance can be issued for venues that require coverage."}}]}</script>
