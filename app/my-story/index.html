    { "@type": "Question", "name": "How far in advance should I reserve?", "acceptedAnswer": { "@type": "Answer", "text": "Most clients reserve 2-4 weeks ahead. Every evening is built as a one-of-one ritual, and preparation begins the moment we speak." } },
    { "@type": "Question", "name": "Do you bring all ingredients and tools?", "acceptedAnswer": { "@type": "Answer", "text": "I arrive with a compact case of precision tools. All ingredients, spirits, and glassware are sourced by the host - I'll provide a tailored shopping list to match your chosen experience." } },
    { "@type": "Question", "name": "Can we choose specific cocktails?", "acceptedAnswer": { "@type": "Answer", "text": "For Simplicity and Bespoke, yes - we collaborate to refine a curated menu together. For Omakase, there is no menu - each creation emerges spontaneously in the moment, tailored to individual guests and the evening's flow." } },
    { "@type": "Question", "name": "Do you provide a bar setup?", "acceptedAnswer": { "@type": "Answer", "text": "By default, I use your existing space. A full portable bar setup or premium glassware rental can be arranged upon request as an enhancement through The Curator add-on." } },
    { "@type": "Question", "name": "Do you travel outside NYC and New Jersey?", "acceptedAnswer": { "@type": "Answer", "text": "Yes, upon request. Travel fees and accommodations are arranged according to distance and event scale - subject to availability." } },
    { "@type": "Question", "name": "What about postponements?", "acceptedAnswer": { "@type": "Answer", "text": "Your deposit can transfer to a new date within six months, depending on availability. One reschedule is included; further changes or peak dates may incur a fee." } },
    { "@type": "Question", "name": "How many guests can you accommodate?", "acceptedAnswer": { "@type": "Answer", "text": "Simplicity accommodates up to 12 guests. Bespoke up to 15 guests. Omakase can serve up to 25 guests; Foundation scales up to 40 with added bar staff. Larger events can be arranged with additional staff through custom consultation." } },
    { "@type": "Question", "name": "Can you create non-alcoholic drinks?", "acceptedAnswer": { "@type": "Answer", "text": "Absolutely. The ritual is about balance and craft, not alcohol. Every composition can be crafted spirit-free with the same precision, complexity, and emotion." } },
