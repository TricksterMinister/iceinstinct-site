      "@type": "Question",

        "@type": "Answer",
        "text": "Up to 25, and that is a hard limit, not a soft one. Spontaneous creation depends on the mixologist holding every palate in the room in mind; past 25 that attention breaks, so we decline rather than dilute the format. For larger evenings, the designed-menu tiers scale with a full bar team instead."
      }
    },
    {
      "@type": "Question",
      "name": "Do we need a large home bar to host one?",

        "@type": "Answer",
