      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Clarity is the visible symptom of density: directionally frozen ice carries no trapped air, so it melts more slowly and dilutes a drink at a controlled rate, and it carries no trapped minerals, so it tastes of nothing. The look is a side effect. The dilution control is the point."
      }
    },

      "@type": "Question",
      "name": "Is clear ice included, or is it an upgrade?",

        "@type": "Answer",
        "text": "It is standard at every Ice & Instinct tier, from The Foundation at $650 upward. We source professional clear ice from dedicated suppliers at supplier cost, with no markup, and hand-cut it to the menu and glassware of the evening."
      }
    },
    {
      "@type": "Question",
      "name": "Can I make clear ice at home?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes - a small insulated cooler with the lid off, in a freezer, freezes from the top down and yields a clear slab above a cloudy base you cut away. It works well for a household. Producing consistent, hand-cut clear ice for fifty guests is a different problem, which is why we source from professional suppliers for events."
