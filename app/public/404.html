<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found - Ice & Instinct</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root {
    --bg: oklch(8% 0 0);
    --fg: oklch(98% 0 0);
    --muted: oklch(62% 0 0);
    --accent: oklch(82% 0.06 85);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  main { max-width: 32rem; }
  .code {
    font-size: clamp(4rem, 2rem + 12vw, 9rem);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--fg);
  }
  .label {
    font-size: 0.72rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 1.6rem 0 0.9rem;
  }
  p {
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--muted);
    margin-bottom: 2.4rem;
  }
  a.home {
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 0.35rem;
    transition: opacity 0.2s ease;
  }
  a.home:hover { opacity: 0.7; }
</style>
</head>
<body>
<main>
  <div class="code">404</div>
  <div class="label">Ice &amp; Instinct</div>
  <p>This page has slipped away. The ritual continues elsewhere.</p>
  <a class="home" href="/">Return home</a>
</main>
</body>
</html>
