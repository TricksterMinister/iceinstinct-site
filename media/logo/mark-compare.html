<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Ice & Instinct - Marks</title>
<style>
body{margin:0;background:#0b0b0b;color:#e9e6e1;font-family:"Helvetica Neue",Arial,sans-serif;padding:28px}
h1{font-weight:300;letter-spacing:4px;text-align:center;font-size:17px;margin:0 0 4px;color:#cfcabf}
.sub{text-align:center;color:#7d776c;font-size:11px;letter-spacing:1.5px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:1240px;margin:0 auto}
.card{background:#131311;border:1px solid #262420;border-radius:12px;overflow:hidden}
.card.pick{border-color:#b98a4a;box-shadow:0 0 0 1px #b98a4a}
.card img{width:100%;display:block}
.meta{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #262420}
.name{font-size:12px;color:#d9d4ca}.num{color:#6f695e;font-size:11px}
.tag{background:#b98a4a;color:#100d08;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:4px;margin-left:6px}
.foot{text-align:center;color:#7d776c;font-size:12px;margin-top:22px;line-height:1.6}
</style></head><body>
<h1>ICE &amp; INSTINCT</h1><div class="sub">LOGO MARKS - NO TEXT</div>
<div class="grid">
<div class="card pick"><img src="mark-2-diamond-glass.png"><div class="meta"><span class="name">Diamond-bowl glass<span class="tag">TOP</span></span><span class="num">2</span></div></div>
<div class="card pick"><img src="mark-6-glass-ice.png"><div class="meta"><span class="name">Coupe + ice cube<span class="tag">TOP</span></span><span class="num">6</span></div></div>
<div class="card pick"><img src="mark-1-cube-ember.png"><div class="meta"><span class="name">Cube + ember<span class="tag">TOP</span></span><span class="num">1</span></div></div>
<div class="card"><img src="mark-4-ice-fire.png"><div class="meta"><span class="name">Ice + flame duality</span><span class="num">4</span></div></div>
<div class="card"><img src="mark-3-cube-facet.png"><div class="meta"><span class="name">Faceted cube</span><span class="num">3</span></div></div>
<div class="card"><img src="mark-5-crystal.png"><div class="meta"><span class="name">Ornate crystal (too detailed)</span><span class="num">5</span></div></div>
</div>
<p class="foot">No text, just the mark. Top picks: 2, 6, 1 (clean, scalable to favicon/avatar).<br>Say a number, or "more around 2" / change color.</p>
</body></html>
